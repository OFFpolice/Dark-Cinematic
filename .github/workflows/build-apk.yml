name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Debug APK
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_type == 'debug'
      run: ./gradlew assembleDebug --build-cache
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

    - name: Build Release APK (requires secrets)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release'
      run: ./gradlew assembleRelease --build-cache
      env:
        KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

    - name: Find APK files
      id: find-apk
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "apk-path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
          echo "apk-name=app-debug.apk" >> $GITHUB_OUTPUT
        elif [ -f "build-outputs/app-debug.apk" ]; then
          echo "apk-path=build-outputs/app-debug.apk" >> $GITHUB_OUTPUT
          echo "apk-name=app-debug.apk" >> $GITHUB_OUTPUT
        fi

    - name: Upload APK Artifact
      if: steps.find-apk.outputs.apk-path != ''
      uses: actions/upload-artifact@v4
      with:
        name: apk-${{ github.run_number }}
        path: ${{ steps.find-apk.outputs.apk-path }}
        retention-days: 30
        compression-level: 9

    - name: Get APK info
      if: steps.find-apk.outputs.apk-path != ''
      run: |
        ls -lh "${{ steps.find-apk.outputs.apk-path }}"
        echo "## APK Build Complete ✅" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **File:** ${{ steps.find-apk.outputs.apk-name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Size:** $(du -h '${{ steps.find-apk.outputs.apk-path }}' | cut -f1)" >> $GITHUB_STEP_SUMMARY
        echo "- **Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

    - name: Comment PR with APK link
      if: github.event_name == 'pull_request' && steps.find-apk.outputs.apk-path != ''
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `✅ APK построен успешно!\n\n**Скачать:** [app-debug.apk](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\nНайти в разделе Artifacts после завершения workflow.`
          })

    - name: Build Summary
      if: always()
      run: |
        echo "Build Status: ${{ job.status }}"
        echo "Duration: ${{ job.duration }}"